---
- name: Install GitHub Runner
  hosts: github_runners
  become: no
  tasks:
      - name: Create a folder for the GitHub Runner
        file:
            path: /home/vagrant/actions-runner
            state: directory
      - name: Download GitHub Runner
        get_url:
            url: https://github.com/actions/runner/releases/download/v2.333.1/actions-runner-linux-x64-2.333.1.tar.gz
            dest: /home/vagrant/actions-runner-linux-x64-2.333.1.tar.gz
      - name: Validate the hash of the downloaded file
        shell: |
            echo "18f8f68ed1892854ff2ab1bab4fcaa2f5abeedc98093b6cb13638991725cab74  /home/vagrant/actions-runner-linux-x64-2.333.1.tar.gz" | shasum -a 256 -c
      - name: Extract the GitHub Runner
        unarchive:
            src: /home/vagrant/actions-runner-linux-x64-2.333.1.tar.gz
            dest: /home/vagrant/actions-runner
            remote_src: yes
      - name: Ensure vagrant user owns the actions-runner directory
        file:
            path: /home/vagrant/actions-runner
            state: directory
            owner: vagrant
            group: vagrant
            recurse: yes
        become: true # Run as root to fix the ownership
      - name: Configure the GitHub Runner
        shell: |
            cd /home/vagrant/actions-runner && \
            ./config.sh --url https://github.com/clement-masquelier/projet-devops --token BCMOTJ533AVKJEXPGCYVFPLJ46Z6W --unattended --replace
        args:
            chdir: /home/vagrant/actions-runner
        become: true
        become_user: vagrant
      - name: Install the GitHub Runner as a service
        shell: |
            cd /home/vagrant/actions-runner && \
            ./svc.sh install
        args:
            chdir: /home/vagrant/actions-runner
        become: true
