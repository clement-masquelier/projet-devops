apiVersion: apps/v1
kind: Deployment
metadata:
    name: api-lacet
spec:
    selector:
        matchLabels:
            app: api-lacet
    template:
        metadata:
            labels:
                app: api-lacet
        spec:
            containers:
                - name: api
                  image: clmtm/devops_final:latest
                  command: ['node', 'src/index.js']
                  ports:
                      - containerPort: 3000
                  resources:
                      requests:
                          cpu: '100m'
                          memory: '128Mi'
                      limits:
                          cpu: '200m'
                          memory: '256Mi'
                  env:
                      - name: DB_HOST
                        value: 'mysql'
                      - name: DB_USERNAME
                        value: 'root'
                      - name: DB_USERNAME_PASSWORD
                        value: 'rootpassword'
                      - name: DB_NAME
                        value: 'lacet_db'
                      - name: NODE_ENV
                        value: 'development'
---
apiVersion: v1
kind: Service
metadata:
    name: api-lacet
spec:
    type: ClusterIP # Garantit que l'API n'est pas accessible de l'extérieur
    ports:
        - port: 80
          targetPort: 3000
    selector:
        app: api-lacet
